name: Staging Preview Builds

# NOTE: Native builds are triggered via GitHub Actions (.github/workflows/eas-build.yml)
# to control costs ($2/build). Web deployment is still automatic (free).
# See docs/setup/EAS_BUILDS.md for details.

on:
  push:
    branches: ["staging"]

jobs:
  # Native builds disabled - use GitHub Actions "EAS Build" workflow instead
  # build_android:
  #   type: build
  #   params:
  #     platform: android
  #     profile: preview
  # build_ios:
  #   type: build
  #   params:
  #     platform: ios
  #     profile: preview

  # Web deployment is free, keep it automatic
  deploy_web:
    type: deploy
    params:
      platform: web
