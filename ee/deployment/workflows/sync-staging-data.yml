name: Sync Staging Data

on:
  schedule:
    # Run daily at 3am ET (8am UTC in winter, 7am UTC in summer)
    - cron: "0 8 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (preview only, no changes)"
        required: false
        default: false
        type: boolean

jobs:
  sync:
    name: Sync Production Data to Staging
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 8.15.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Load production secrets
        uses: ./.github/actions/load-secrets
        with:
          client-id: ${{ secrets.INFISICAL_CLIENT_ID }}
          client-secret: ${{ secrets.INFISICAL_CLIENT_SECRET }}
          environment: prod

      - name: Store production DB URL
        run: echo "PROD_DATABASE_URL=$DATABASE_URL" >> $GITHUB_ENV

      - name: Load staging secrets
        uses: ./.github/actions/load-secrets
        with:
          client-id: ${{ secrets.INFISICAL_CLIENT_ID }}
          client-secret: ${{ secrets.INFISICAL_CLIENT_SECRET }}
          environment: staging

      - name: Store staging DB URL
        run: echo "STAGING_DATABASE_URL=$DATABASE_URL" >> $GITHUB_ENV

      - name: Install PostgreSQL 17 client
        run: |
          # Add PostgreSQL 17 repository (required for Supabase v17 compatibility)
          sudo sh -c 'echo "deb https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" > /etc/apt/sources.list.d/pgdg.list'
          wget --quiet -O - https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo apt-key add -
          sudo apt-get update
          sudo apt-get install -y postgresql-client-17
          # Add PostgreSQL 17 to PATH (it installs to /usr/lib/postgresql/17/bin/)
          echo "/usr/lib/postgresql/17/bin" >> $GITHUB_PATH

      - name: Run data sync
        env:
          PROD_DATABASE_URL: ${{ env.PROD_DATABASE_URL }}
          STAGING_DATABASE_URL: ${{ env.STAGING_DATABASE_URL }}
        run: |
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            pnpm tsx scripts/sync-staging-data.ts --dry-run --verbose
          else
            pnpm tsx scripts/sync-staging-data.ts --verbose
          fi

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Staging data sync failed. Check logs for details."
