name: Sync Secrets from 1Password

# Syncs secrets from 1Password to GitHub environment secrets, via the shared
# Supa Framework reusable workflow (Supa-Media/supa-framework
# .github/workflows/sync-secrets.yml@v1), which runs
# `supa-sync-1password-to-github` against ee/secrets-allowlist.json. Runs
# automatically on merge to main when the allowlist changes (a secret was
# added/removed), and can be run manually for value rotations that don't touch
# code. See docs/secrets.md's "Secret Update Flow" for the full model.
#
# Prerequisites (repo secrets):
#   - OP_SERVICE_ACCOUNT_TOKEN: 1Password service account token, scoped to the
#     `Togather` vault
#   - GH_ADMIN_TOKEN: GitHub PAT with repo admin scope (secrets:write) — the
#     default GITHUB_TOKEN cannot manage repository/environment secrets

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to sync"
        required: true
        type: choice
        options:
          - staging
          - production
          - both
      dry-run:
        description: "Show what would be synced without making changes"
        required: false
        type: boolean
        default: false
  # Auto-sync when the allowlist changes. A new secret is only synced once its
  # key is added here, so a merge to main that touches this file means "a
  # secret was added/changed/removed" — re-run the sync automatically for both
  # environments. This only fires on that file change, so it stays well within
  # 1Password's rate limits (unlike a frequent cron). Manual dispatch above
  # still works for rotations that don't touch code.
  push:
    branches:
      - main
    paths:
      - ee/secrets-allowlist.json

jobs:
  sync:
    name: Sync ${{ inputs.environment || 'both' }} secrets
    uses: Supa-Media/supa-framework/.github/workflows/sync-secrets.yml@v1
    with:
      vault: Togather
      allowlist-path: ee/secrets-allowlist.json
      # On push there is no `inputs`, so default to syncing both environments.
      environment: ${{ inputs.environment || 'both' }}
      dry-run: ${{ inputs.dry-run || false }}
    secrets:
      OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
      GH_ADMIN_TOKEN: ${{ secrets.GH_ADMIN_TOKEN }}
