name: Sync Secrets from 1Password

# Syncs secrets from 1Password to GitHub environment secrets, via the shared
# Supa Framework reusable workflow (Supa-Media/supa-framework
# .github/workflows/sync-secrets.yml@v1), which runs
# `supa-sync-1password-to-github` against ee/secrets-allowlist.json. Manual
# dispatch only for now — see PR #628. See docs/secrets.md's "Secret Update
# Flow" for the full model.
#
# Prerequisites (repo secrets):
#   - OP_SERVICE_ACCOUNT_TOKEN: 1Password service account token, scoped to the
#     `Togather` vault
#   - GH_ADMIN_TOKEN: GitHub PAT with repo admin scope (secrets:write) — the
#     default GITHUB_TOKEN cannot manage repository/environment secrets

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to sync"
        required: true
        type: choice
        options:
          - staging
          - production
          - both
      dry-run:
        description: "Show what would be synced without making changes"
        required: false
        type: boolean
        default: false
  # DISABLED pending a verified dry-run of the new prune-capable bin — see
  # PR #628. `ee/secrets-allowlist.json` is new in that PR, and this trigger
  # would otherwise auto-fire a real sync (for both environments) the moment
  # it merges to main, before anyone has confirmed the plan has zero
  # unexpected prunes under the new `optional`-prunes semantics. Re-enable
  # this block once a maintainer has run:
  #   gh workflow run sync-secrets.yml -f environment=both -f dry-run=true
  # and confirmed the plan is clean, then follow up with a real
  # `-f dry-run=false` run before flipping this back on.
  #
  # push:
  #   branches:
  #     - main
  #   paths:
  #     - ee/secrets-allowlist.json

jobs:
  sync:
    name: Sync ${{ inputs.environment || 'both' }} secrets
    uses: Supa-Media/supa-framework/.github/workflows/sync-secrets.yml@v1
    with:
      vault: Togather
      allowlist-path: ee/secrets-allowlist.json
      # On push there is no `inputs`, so default to syncing both environments.
      environment: ${{ inputs.environment || 'both' }}
      dry-run: ${{ inputs.dry-run || false }}
    secrets:
      OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
      GH_ADMIN_TOKEN: ${{ secrets.GH_ADMIN_TOKEN }}
