name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        We'd love to hear your ideas! Please describe what you'd like to see in Togather.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the frustration or gap you're experiencing. What's hard or missing today?
      placeholder: |
        Example: "As a group leader, I have no way to see which members haven't attended in a while. I end up manually checking each week's attendance to figure out who to follow up with."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: What would you like to see?
      description: Describe your ideal solution. How would it work? What would it look like?
      placeholder: |
        Example: "A simple list on the group page that shows members who haven't attended in the last 3 weeks, so leaders can quickly see who to reach out to."
    validations:
      required: true

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots or examples (optional)
      description: Add 1-3 screenshots, mockups, or examples from other apps that show what you have in mind. Drag and drop images here.
      placeholder: |
        Drag and drop images here, or describe what it might look like.

  - type: dropdown
    id: who-benefits
    attributes:
      label: Who would this help?
      description: Select the role(s) that would benefit most.
      multiple: true
      options:
        - Members (everyday users)
        - Group leaders
        - Community admins / pastors
        - Everyone
    validations:
      required: true

  - type: dropdown
    id: urgency
    attributes:
      label: How important is this to you?
      options:
        - Nice to have
        - Important — I work around it today
        - Critical — it's blocking me from using Togather
    validations:
      required: true
